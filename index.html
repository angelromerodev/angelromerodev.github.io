<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #0c4a6e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    h1 {
        font-size: 100px;
        color: white;
        margin-top: 200px;
        margin-bottom: 5px;
    }

    h3 {
        font-size: 20px;
        color: white;
        margin-top: 5px;
        margin-bottom: 5px;
    }

    h5 {
        margin-bottom: 150px;
        color: white;
    }

    #menu {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    button {

        font-size: 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background-color: #2ecc71;
        color: white;
        transition: background-color 0.3s ease;

    }
</style>

<body>
    <h1>Backend dev's game&lt;/h1&gt;</h1>
    <h3>GOTY collector deluxe edition. +50 DLCs</h3>

<div id="menu">
    <button id="startButton">Start Game</button>
    <button id="controlsButton">Show Controls</button>
</div>

<script>
    document.getElementById('startButton').addEventListener('click', function() {
        startGame();
    });

    document.getElementById('controlsButton').addEventListener('click', function() {
        showControls();
    });

    function startGame() {
        
        window.location.href = 'game.html';

</script>
