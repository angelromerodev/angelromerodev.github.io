<html>
	<header>
		<title>Backend dev's game</title>
		<link rel="icon" href="ico/gamepad.ico">
		<style>
			body {
			  margin: 0;
			  background: #0c4a6e;
			  background-image: url("images/sky2.jpg");
			  background-size: cover;
				  background-position: center;
		
			}
			#resetButton {
				position: absolute;
				top: 10px;
				right: 10px;
				z-index: 1000;
				font-size: 20px;
				padding: 10px 20px;
				cursor: pointer;
				background-color: #2ecc71;
				border: none;
				border-radius: 5px;
				color: white;
				transition: background-color 0.3s ease;
			}
	
			#resetButton:hover {
				background-color: #27ae60;
			}
	
			#restartButton {
				font-size: 20px; 
				padding: 10px 20px;
				cursor: pointer;
				background-color: #2ecc71;
				border: none;
				border-radius: 5px;
				color: white;
				transition: background-color 0.3s ease;
				margin-top: 20px;
			}
	
			#restartButton:hover {
				background-color: #27ae60;
			}
	
			#score {
				position: absolute;
				top: 20px;
				right: 150px;
				color: green;
				font-size: 24px;
				z-index: 1000;
			}
	
			#title {
				position: absolute;
				top: 20px;
				left: 10px;
				color: black;
				font-size: 24px;
				z-index: 1000;
			}
	
			#endScreen {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-color: rgba(0, 0, 0, 0.5);
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 1000;
			}
	
			#endScreenContent {
				text-align: center;
				color: white;
				font-size: 36px;
			}
	
			#homeButton {
				font-size: 20px; 
				padding: 10px 20px;
				cursor: pointer;
				background-color: #3498db;
				border: none;
				border-radius: 5px;
				color: white;
				transition: background-color 0.3s ease;
				margin-top: 10px;
			}
	
			#homeButton:hover {
				background-color: #2980b9;
			}
	
			
		</style>
		
		<button id="resetButton">Restart</button>
		<div id="score">Score: 0</div>
		<div id="title">Backend dev's game&lt;/h1&gt;</div>
	</header>
	
	<body>
		<div id="endScreen">
			<div id="endScreenContent">
				<h2>Game Over</h2>
				<p>Your Score: <span id="finalScore">0</span></p>
				<button id="restartButton">Restart Game</button>
				<button id="homeButton">Home Page</button>
			</div>
		</div>
		<script
		async
		src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"
	></script>
	
	<script type="importmap">
	{
		"imports": {
		"three": "https://unpkg.com/three@0.150.1/build/three.module.js",
		"three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
		}
	}
	</script>
	
	<script type="module" src="js/game.js"></script>
	
	<script>
		const resetButton = document.getElementById('resetButton');
		
		let score = 0;
		resetButton.addEventListener('click', function() {
			location.reload(); 
		});
	
		const restartButton = document.getElementById('restartButton');
		restartButton.addEventListener('click', function() {
			location.reload();
		});
	
		const homeButton = document.getElementById('homeButton');
		homeButton.addEventListener('click', function() {
				window.location.href = 'index.html';
			});
		
	</script>
	</body>
</html>
